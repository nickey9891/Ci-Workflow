const PRIORITIES = ["CRITICAL","HIGH","MEDIUM","LOW"];
const PCOL = { CRITICAL:"#ef4444",HIGH:"#f97316",MEDIUM:"#eab308",LOW:"#22c55e" };
const THREAT_COL = { ESPIONAGE:"#ef4444","FIS OPERATION":"#f97316","CYBER CI":"#06b6d4","FIS CONSPIRACY":"#a855f7","IDENTITY EXPOSURE":"#ec4899","TECH TRANSFER":"#3b82f6","TRANSNATIONAL THREAT":"#f59e0b" };
const TABS = ["INTAKE","TASKS","BRIEFING"];

const matchStatute = v => Object.keys(CI_STATUTES).find(k => v?.includes(k) || (k==="EXPORT" && (v?.toLowerCase().includes("export")||v?.includes("EAR")||v?.includes("ITAR"))));

const buildTasks = (violation) => {
  const key = matchStatute(violation);
  const stat = CI_STATUTES[key];
  if (!stat) return [];
  return stat.elements.flatMap((el,ei) => el.steps.map((s,si) => ({
    ...s, id:`${Date.now()}-${ei}-${si}`, done:false,
    elementName:el.name, elementColor:el.color, elementIdx:ei,
  })));
};

const SEED = [
  { id:1, name:"CI-2024-001", subject:"FALCON", violation:"18 U.S.C. § 794", priority:"CRITICAL", sol:"2027-03-15", source:"HUMINT/SIGINT", status:"ACTIVE", notes:"PRC handler contact confirmed via FISA", threat:"ESPIONAGE" },
  { id:2, name:"CI-2024-002", subject:"NIGHTSHADE", violation:"18 U.S.C. § 951", priority:"HIGH", sol:"2027-06-01", source:"SIGINT", status:"ACTIVE", notes:"FARA non-compliance confirmed, SVR nexus", threat:"FIS OPERATION" },
];

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState(0);
  const [cases, setCases] = useState([]);
  const [caseTasks, setCaseTasks] = useState({});
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ name:"",subject:"",violation:"",priority:"HIGH",sol:"",source:"",status:"ACTIVE",notes:"" });
  const [selId, setSelId] = useState(null);
  const [phase, setPhase] = useState("IMMEDIATE");
  const [briefId, setBriefId] = useState(null);
  const [expandedStep, setExpandedStep] = useState(null);
  const [collapsed, setCollapsed] = useState({});
  const [saveLabel, setSaveLabel] = useState("● SAVED");

  useEffect(() => {
    const saved = loadData();
    if (saved?.cases?.length) {
      setCases(saved.cases); setCaseTasks(saved.caseTasks||{});
      setSelId(saved.cases[0]?.id||null); setBriefId(saved.cases[0]?.id||null);
    } else {
      const st = { 1:buildTasks("18 U.S.C. § 794"), 2:buildTasks("18 U.S.C. § 951") };
      setCases(SEED); setCaseTasks(st); setSelId(1); setBriefId(1); saveData(SEED,st);
    }
  }, []);

  const persist = (c, t) => { saveData(c,t); setSaveLabel("● SAVING..."); setTimeout(()=>setSaveLabel("● SAVED"),600); };

  const addCase = () => {
    if (!form.name) return;
    const id = Date.now();
    const statKey = matchStatute(form.violation);
    const threat = CI_STATUTES[statKey]?.threat||"CI";
    const nc = {...form,id,threat};
    const nt = buildTasks(form.violation);
    const newCases = [...cases,nc];
    const newTasks = {...caseTasks,[id]:nt};
    setCases(newCases); setCaseTasks(newTasks); persist(newCases,newTasks);
    setForm({name:"",subject:"",violation:"",priority:"HIGH",sol:"",source:"",status:"ACTIVE",notes:""});
    setShowForm(false); setSelId(id); setBriefId(id); setTab(1);
  };

  const deleteCase = (id) => {
    const newCases = cases.filter(c=>c.id!==id);
    const newTasks = {...caseTasks}; delete newTasks[id];
    setCases(newCases); setCaseTasks(newTasks); persist(newCases,newTasks);
    if(selId===id) setSelId(newCases[0]?.id||null);
    if(briefId===id) setBriefId(newCases[0]?.id||null);
  };

  const toggle = (caseId, taskId) => {
    const newTasks = {...caseTasks,[caseId]:caseTasks[caseId].map(t=>t.id===taskId?{...t,done:!t.done}:t)};
    setCaseTasks(newTasks); persist(cases,newTasks);
  };

  const solDays = s => s ? Math.ceil((new Date(s)-new Date())/86400000) : null;
  const sc = cases.find(c=>c.id===selId);
  const sTasks = caseTasks[selId]||[];
  const pTasks = sTasks.filter(t=>t.phase===phase);
  const done = sTasks.filter(t=>t.done).length;
  const pct = sTasks.length ? Math.round((done/sTasks.length)*100) : 0;
  const bc = cases.find(c=>c.id===briefId);
  const bTasks = caseTasks[briefId]||[];

  const elGroups = {};
  pTasks.forEach(t=>{ if(!elGroups[t.elementName]) elGroups[t.elementName]=[]; elGroups[t.elementName].push(t); });

  const C = {
    root:{minHeight:"100vh",background:"#060d18",color:"#6090b0",fontFamily:"'Courier New',monospace"},
    hdr:{background:"#070e1c",borderBottom:"1px solid #0a1525",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8},
    logoWrap:{display:"flex",alignItems:"center",gap:10},
    logo:{width:32,height:32,background:"#0a1525",border:"1px solid #1e3a6e",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:"#60a5fa",flexShrink:0},
    appTitle:{fontSize:10,fontWeight:"bold",color:"#b8d0e8",letterSpacing:3},
    appSub:{fontSize:7,color:"#1a3050",letterSpacing:2},
    stats:{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"},
    sLbl:{fontSize:8,color:"#1a3050",letterSpacing:1},
    sNum:{fontSize:18,fontWeight:"bold",lineHeight:1},
    saveInd:{fontSize:8,color:"#22c55e",letterSpacing:1},
    tabBar:{display:"flex",background:"#060d18",borderBottom:"1px solid #0a1525",overflowX:"auto"},
    tab:{background:"none",border:"none",borderBottom:"2px solid transparent",color:"#1e3a5f",padding:"11px 16px",fontSize:9,letterSpacing:2,fontFamily:"inherit",cursor:"pointer",whiteSpace:"nowrap"},
    tabOn:{borderBottomColor:"#2563eb",color:"#60a5fa",fontWeight:"bold"},
    body:{padding:"16px",maxWidth:800,margin:"0 auto"},
    row:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8},
    dim:{fontSize:9,color:"#1e3a5f",letterSpacing:2},
    lbl:{fontSize:8,color:"#1e3a5f",letterSpacing:1,marginBottom:4},
    inp:{width:"100%",background:"#060d18",border:"1px solid #0a1525",color:"#c8dcea",padding:"8px 10px",fontSize:12,fontFamily:"inherit",boxSizing:"border-box",outline:"none"},
    btnP:{background:"#0a1525",border:"1px solid #2563eb",color:"#60a5fa",padding:"9px 14px",fontSize:9,letterSpacing:2,fontFamily:"inherit",cursor:"pointer"},
    btnG:{background:"none",border:"1px solid #0a1525",color:"#1e3a5f",padding:"9px 14px",fontSize:9,letterSpacing:2,fontFamily:"inherit",cursor:"pointer"},
    formBox:{background:"#070e1c",border:"1px solid #2563eb",padding:18,marginBottom:18,boxShadow:"0 0 30px #2563eb10"},
    formHdr:{fontSize:9,color:"#60a5fa",letterSpacing:3,marginBottom:16},
    hint:{marginTop:10,fontSize:9,color:"#1e3a5f",background:"#060d18",padding:"8px 12px",border:"1px solid #0a1525"},
    cCard:{background:"#060d18",border:"1px solid #0e1e30",borderLeft:"3px solid #ef4444",padding:"14px 16px",marginBottom:10,transition:"background .15s"},
    cName:{fontSize:12,fontWeight:"bold",color:"#b8d0e8"},
    progCard:{background:"#070e1c",border:"1px solid #0e1e30",padding:"14px 16px",marginBottom:14},
    pill:{background:"#060d18",border:"1px solid #0a1525",color:"#1e3a5f",padding:"7px 12px",fontSize:9,letterSpacing:1,fontFamily:"inherit",cursor:"pointer"},
    pillOn:{background:"#0a1525",borderColor:"#2563eb",color:"#60a5fa"},
    phBtn:{background:"#060d18",border:"1px solid #0a1525",color:"#1e3a5f",padding:"7px 12px",fontSize:8,letterSpacing:2,fontFamily:"inherit",cursor:"pointer",display:"flex",alignItems:"center",gap:5},
    phOn:{background:"#0a1525",borderColor:"#2563eb",color:"#60a5fa"},
    phDone:{background:"#081a10",borderColor:"#22c55e",color:"#22c55e"},
    phCnt:{background:"#0a1525",padding:"1px 5px",fontSize:9,color:"#60a5fa"},
    elGroup:{background:"#070e1c",border:"1px solid #0e1e30",borderLeft:"3px solid #2563eb",marginBottom:12,overflow:"hidden"},
    elHdr:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",cursor:"pointer",borderBottom:"1px solid #0a1525"},
    evBtn:{fontSize:8,border:"1px solid #0e1e30",padding:"3px 8px",letterSpacing:1,cursor:"pointer",flexShrink:0,background:"transparent",fontFamily:"inherit"},
    evPanel:{background:"#050b14",borderLeft:"3px solid #2563eb",borderBottom:"1px solid #0a1525",padding:"12px 14px 12px 58px"},
    briefCard:{background:"#070e1c",border:"1px solid #2563eb",padding:20,marginBottom:14,boxShadow:"0 0 30px #2563eb10"},
    briefTitle:{fontSize:9,color:"#60a5fa",letterSpacing:3,marginBottom:20,borderBottom:"1px solid #0a1525",paddingBottom:12},
  };

  const badge = col => ({fontSize:8,padding:"2px 7px",background:col+"18",border:`1px solid ${col}44`,color:col,letterSpacing:1});
  const chk = (done,color) => ({width:28,height:28,flexShrink:0,border:`2px solid ${done?"#22c55e":color+"66"}`,background:done?"#0a2018":"transparent",borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s",boxShadow:done?"0 0 8px #22c55e40":"none"});

  return (
    <div style={C.root}>
      {/* Header */}
      <div style={C.hdr}>
        <div style={C.logoWrap}>
          <div style={C.logo}>⬡</div>
          <div>
            <div style={C.appTitle}>CI CASE MANAGEMENT</div>
            <div style={C.appSub}>ELEMENT-BASED WORKFLOW · RESTRICTED</div>
          </div>
        </div>
        <div style={C.stats}>
          <div style={{fontSize:8,color:"#22c55e",letterSpacing:1}}>{saveLabel}</div>
          {[{l:"CASES",v:cases.filter(c=>c.status==="ACTIVE").length,c:"#60a5fa"},{l:"CRITICAL",v:cases.filter(c=>c.priority==="CRITICAL").length,c:"#ef4444"},{l:"DUE NOW",v:Object.values(caseTasks).flat().filter(t=>!t.done&&t.phase==="IMMEDIATE").length,c:"#f59e0b"}].map(s=>(
            <div key={s.l} style={{textAlign:"center"}}>
              <div style={C.sLbl}>{s.l}</div>
              <div style={{...C.sNum,color:s.c}}>{s.v}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Tabs */}
      <div style={C.tabBar}>
        {TABS.map((t,i)=><button key={i} onClick={()=>setTab(i)} style={{...C.tab,...(tab===i?C.tabOn:{})}}>{t}</button>)}
      </div>

      <div style={C.body}>

        {/* ── TAB 0: INTAKE ── */}
        {tab===0 && (
          <div>
            <div style={C.row}>
              <span style={C.dim}>// {cases.length} CI CASES</span>
              <button onClick={()=>setShowForm(!showForm)} style={C.btnP}>+ NEW CASE</button>
            </div>

            {showForm && (
              <div style={C.formBox}>
                <div style={C.formHdr}>▸ CI CASE INTAKE</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  {[["CASE NUMBER","name"],["SUBJECT CODE NAME","subject"],["SOURCE","source"]].map(([l,f])=>(
                    <div key={f}><div style={C.lbl}>{l}</div><input value={form[f]} onChange={e=>setForm({...form,[f]:e.target.value})} style={C.inp}/></div>
                  ))}
                  <div>
                    <div style={C.lbl}>SOL DATE</div>
                    <input type="date" value={form.sol} onChange={e=>setForm({...form,sol:e.target.value})} style={C.inp}/>
                  </div>
                  <div>
                    <div style={C.lbl}>STATUTE</div>
                    <select value={form.violation} onChange={e=>setForm({...form,violation:e.target.value})} style={C.inp}>
                      <option value="">— SELECT —</option>
                      {Object.entries(CI_STATUTES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                    </select>
                  </div>
                  <div>
                    <div style={C.lbl}>PRIORITY</div>
                    <select value={form.priority} onChange={e=>setForm({...form,priority:e.target.value})} style={C.inp}>
                      {PRIORITIES.map(p=><option key={p}>{p}</option>)}
                    </select>
                  </div>
                </div>
                <div style={{marginTop:12}}>
                  <div style={C.lbl}>PREDICATION SUMMARY</div>
                  <textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} rows={2} style={{...C.inp,resize:"none"}}/>
                </div>
                <div style={C.hint}>ℹ Element tasks auto-generate per statute. Saves automatically.</div>
                <div style={{display:"flex",gap:8,marginTop:12}}>
                  <button onClick={addCase} style={C.btnP}>OPEN CASE & GENERATE TASKS</button>
                  <button onClick={()=>setShowForm(false)} style={C.btnG}>CANCEL</button>
                </div>
              </div>
            )}

            {[...cases].sort((a,b)=>PRIORITIES.indexOf(a.priority)-PRIORITIES.indexOf(b.priority)).map(c=>{
              const sol=solDays(c.sol);
              const ct=caseTasks[c.id]||[];
              const cd=ct.filter(t=>t.done).length;
              const cp=ct.length?Math.round((cd/ct.length)*100):0;
              const tc=THREAT_COL[c.threat]||"#60a5fa";
              return (
                <div key={c.id} style={{...C.cCard,borderLeftColor:PCOL[c.priority]}} onMouseEnter={e=>e.currentTarget.style.background="#080f1c"} onMouseLeave={e=>e.currentTarget.style.background="#060d18"}>
                  <div style={{display:"flex",justifyContent:"space-between",gap:12}}>
                    <div style={{flex:1,cursor:"pointer"}} onClick={()=>{setSelId(c.id);setTab(1);}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
                        <span style={C.cName}>{c.name}</span>
                        <span style={{fontSize:10,color:"#4a7090"}}>SUBJ: {c.subject}</span>
                        <span style={badge(PCOL[c.priority])}>{c.priority}</span>
                        <span style={badge(tc)}>{c.threat||"CI"}</span>
                      </div>
                      <div style={{fontSize:9,color:"#2d506e",marginBottom:8}}>{c.violation}</div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{flex:1,height:4,background:"#0a1525",borderRadius:2}}>
                          <div style={{width:`${cp}%`,height:"100%",background:cp===100?"#22c55e":"#2563eb",borderRadius:2,transition:"width .4s"}}/>
                        </div>
                        <span style={{fontSize:9,color:"#1e3a5f",minWidth:75}}>{cd}/{ct.length} TASKS</span>
                      </div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",justifyContent:"space-between",gap:8}}>
                      {sol!==null&&<div style={{textAlign:"right"}}><div style={{fontSize:8,color:"#1e3a5f"}}>SOL</div><div style={{fontSize:22,fontWeight:"bold",color:sol<90?"#ef4444":sol<180?"#f97316":"#22c55e",lineHeight:1}}>{sol}d</div></div>}
                      <button onClick={()=>deleteCase(c.id)} style={{...C.btnG,fontSize:8,padding:"3px 8px"}}>CLOSE</button>
                    </div>
                  </div>
                </div>
              );
            })}
            {cases.length===0&&<div style={{fontSize:12,color:"#1e3a5f",textAlign:"center",padding:"50px 0",fontStyle:"italic"}}>No cases. Open a new CI case above.</div>}
          </div>
        )}

        {/* ── TAB 1: TASKS ── */}
        {tab===1 && (
          <div>
            <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
              {cases.map(c=>(
                <button key={c.id} onClick={()=>setSelId(c.id)} style={{...C.pill,...(selId===c.id?C.pillOn:{})}}>
                  <span style={{width:6,height:6,borderRadius:"50%",background:PCOL[c.priority],display:"inline-block",marginRight:5}}/>
                  {c.name}
                </button>
              ))}
            </div>
            {sc ? (
              <>
                <div style={C.progCard}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                    <div><div style={C.cName}>{sc.name} — {sc.subject}</div><div style={{fontSize:9,color:"#2d506e",marginTop:2}}>{sc.violation}</div></div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:30,fontWeight:"bold",color:pct===100?"#22c55e":"#60a5fa",lineHeight:1}}>{pct}%</div>
                      <div style={{fontSize:8,color:"#1e3a5f"}}>{done}/{sTasks.length} COMPLETE</div>
                    </div>
                  </div>
                  <div style={{height:6,background:"#0a1525",borderRadius:3}}>
                    <div style={{width:`${pct}%`,height:"100%",background:pct===100?"linear-gradient(90deg,#22c55e,#16a34a)":"linear-gradient(90deg,#2563eb,#1d4ed8)",borderRadius:3,transition:"width .5s"}}/>
                  </div>
                </div>

                <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
                  {PHASES.map(ph=>{
                    const phT=sTasks.filter(t=>t.phase===ph);
                    const phD=phT.filter(t=>t.done).length;
                    const allDone=phT.length>0&&phD===phT.length;
                    return (
                      <button key={ph} onClick={()=>setPhase(ph)} style={{...C.phBtn,...(phase===ph?(allDone?C.phDone:C.phOn):{})}}>
                        {allDone&&<span style={{color:"#22c55e",marginRight:3}}>✓</span>}
                        {ph}<span style={C.phCnt}>{phD}/{phT.length}</span>
                      </button>
                    );
                  })}
                </div>

                <div style={{fontSize:8,color:"#1e3a5f",letterSpacing:2,marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
                  <span>// {PHASE_RANGE[phase]}</span><span style={{flex:1,borderTop:"1px solid #0a1525"}}/>
                </div>

                {Object.entries(elGroups).map(([elName,steps])=>{
                  const elDone=steps.filter(t=>t.done).length;
                  const elPct=Math.round((elDone/steps.length)*100);
                  const isCollapsed=collapsed[elName];
                  const elColor=steps[0]?.elementColor||"#2563eb";
                  return (
                    <div key={elName} style={{...C.elGroup,borderLeftColor:elColor}}>
                      <div onClick={()=>setCollapsed(p=>({...p,[elName]:!p[elName]}))} style={C.elHdr}>
                        <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
                          <div style={{width:30,height:30,borderRadius:4,background:elPct===100?"#0a2018":"#0a1525",border:`1px solid ${elPct===100?"#22c55e":elColor+"55"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:elPct===100?13:11,color:elPct===100?"#22c55e":elColor,flexShrink:0}}>
                            {elPct===100?"✓":"⬡"}
                          </div>
                          <div>
                            <div style={{fontSize:10,fontWeight:"bold",color:"#b8d0e8",letterSpacing:1}}>{elName}</div>
                            <div style={{fontSize:8,color:"#1e3a5f",marginTop:2}}>{elDone}/{steps.length} SUB-STEPS · {elPct}% PROVEN</div>
                          </div>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <div style={{width:70,height:3,background:"#0a1525",borderRadius:2}}><div style={{width:`${elPct}%`,height:"100%",background:elPct===100?"#22c55e":elColor,borderRadius:2}}/></div>
                          <span style={{fontSize:11,color:"#1e3a5f"}}>{isCollapsed?"▸":"▾"}</span>
                        </div>
                      </div>

                      {!isCollapsed && steps.map((step,si)=>(
                        <div key={step.id}>
                          <div onClick={()=>toggle(selId,step.id)}
                            style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",borderBottom:"1px solid #080f1c",cursor:"pointer",transition:"background .15s",background:step.done?"#060a12":"#080f1c",opacity:step.done?0.5:1,userSelect:"none"}}
                            onMouseEnter={e=>!step.done&&(e.currentTarget.style.background="#0b1828")}
                            onMouseLeave={e=>!step.done&&(e.currentTarget.style.background="#080f1c")}>
                            <div style={{fontSize:8,color:"#1e3a5f",minWidth:22,flexShrink:0}}>{String(si+1).padStart(2,"0")}</div>
                            <div style={chk(step.done,elColor)} onClick={e=>{e.stopPropagation();toggle(selId,step.id);}}>
                              {step.done&&<span style={{fontSize:13,color:"#22c55e",fontWeight:"bold"}}>✓</span>}
                            </div>
                            <div style={{flex:1}}>
                              <div style={{fontSize:12,color:step.done?"#1e3a5f":"#c8dcea",textDecoration:step.done?"line-through":"none",marginBottom:4,lineHeight:1.5}}>{step.text}</div>
                              <div style={{fontSize:8,color:"#1e3a5f"}}>TARGET: DAY {step.day}</div>
                            </div>
                            <div onClick={e=>{e.stopPropagation();setExpandedStep(expandedStep===step.id?null:step.id);}}
                              style={{...C.evBtn,borderColor:expandedStep===step.id?elColor:"#0e1e30",color:expandedStep===step.id?elColor:"#1e3a5f"}}>
                              {expandedStep===step.id?"▲ EVD":"▼ EVD"}
                            </div>
                          </div>
                          {expandedStep===step.id&&(
                            <div style={{...C.evPanel,borderLeftColor:elColor}}>
                              <div style={{fontSize:8,color:elColor,letterSpacing:2,marginBottom:8}}>◈ REQUIRED EVIDENCE</div>
                              {step.evidence.split(", ").map((e,i)=>(
                                <div key={i} style={{display:"flex",gap:6,marginBottom:5}}>
                                  <span style={{color:elColor,flexShrink:0,fontSize:9}}>▸</span>
                                  <span style={{fontSize:11,color:"#7090a8",lineHeight:1.5}}>{e}</span>
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  );
                })}
                {pTasks.length===0&&<div style={{fontSize:12,color:"#1e3a5f",textAlign:"center",padding:"30px 0",fontStyle:"italic"}}>No tasks for this phase.</div>}
              </>
            ):(
              <div style={{fontSize:12,color:"#1e3a5f",textAlign:"center",padding:"50px 0",fontStyle:"italic"}}>Select a case above or open one from Intake.</div>
            )}
          </div>
        )}

        {/* ── TAB 2: BRIEFING ── */}
        {tab===2 && (
          <div>
            <div style={{marginBottom:16}}>
              <div style={C.lbl}>SELECT CASE</div>
              <select value={briefId||""} onChange={e=>setBriefId(Number(e.target.value))} style={{...C.inp,width:"100%"}}>
                {cases.map(c=><option key={c.id} value={c.id}>{c.name} — {c.subject} — {c.violation}</option>)}
              </select>
            </div>

            {bc&&(()=>{
              const sol=solDays(bc.sol);
              const bd=bTasks.filter(t=>t.done).length;
              const bp=bTasks.length?Math.round((bd/bTasks.length)*100):0;
              const pending=bTasks.filter(t=>!t.done&&t.phase==="IMMEDIATE");
              const statObj=CI_STATUTES[matchStatute(bc.violation)];
              const elements=statObj?.elements||[];
              return (
                <>
                  <div style={C.briefCard}>
                    <div style={C.briefTitle}>▸ SUPERVISOR BRIEFING — {bc.name} / {bc.subject}</div>
                    {[["STATUTE",bc.violation||"—"],["SUBJECT ID",bc.subject||"—"],["THREAT",bc.threat||"—"],["SOURCE",`${bc.source||"—"}${bc.notes?" — "+bc.notes:""}`],["STATUS",bc.status],["PRIORITY",bc.priority]].map(([l,v])=>(
                      <div key={l} style={{display:"flex",marginBottom:10,gap:14}}>
                        <div style={{fontSize:8,color:"#1e3a5f",letterSpacing:1,minWidth:120}}>{l}</div>
                        <div style={{fontSize:11,color:"#c8dcea"}}>{v}</div>
                      </div>
                    ))}
                    {sol!==null&&(
                      <div style={{display:"flex",marginBottom:10,gap:14}}>
                        <div style={{fontSize:8,color:"#1e3a5f",letterSpacing:1,minWidth:120}}>SOL REMAINING</div>
                        <div style={{fontSize:11}}><span style={{color:"#c8dcea"}}>{bc.sol}</span><span style={{marginLeft:8,color:sol<90?"#ef4444":"#22c55e",fontSize:10}}>[{sol} DAYS]</span></div>
                      </div>
                    )}
                    <div style={{display:"flex",marginBottom:12,gap:14}}>
                      <div style={{fontSize:8,color:"#1e3a5f",letterSpacing:1,minWidth:120}}>COMPLETION</div>
                      <div style={{flex:1,display:"flex",alignItems:"center",gap:8}}>
                        <div style={{flex:1,height:4,background:"#0a1525",borderRadius:2}}><div style={{width:`${bp}%`,height:"100%",background:bp===100?"#22c55e":"#2563eb",borderRadius:2}}/></div>
                        <span style={{fontSize:10,color:"#60a5fa"}}>{bd}/{bTasks.length} ({bp}%)</span>
                      </div>
                    </div>

                    {elements.length>0&&(
                      <div style={{borderTop:"1px solid #0a1525",paddingTop:12,marginTop:4}}>
                        <div style={{fontSize:8,color:"#1e3a5f",letterSpacing:2,marginBottom:10}}>ELEMENT STATUS</div>
                        {elements.map((el,i)=>{
                          const elT=bTasks.filter(t=>t.elementName===el.name);
                          const elD=elT.filter(t=>t.done).length;
                          const elP=elT.length?Math.round((elD/elT.length)*100):0;
                          return (
                            <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                              <div style={{width:18,height:18,border:`1px solid ${elP===100?"#22c55e":el.color+"55"}`,background:elP===100?"#0a2018":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#22c55e",flexShrink:0}}>{elP===100?"✓":""}</div>
                              <div style={{flex:1}}>
                                <div style={{fontSize:9,color:"#7090a8",marginBottom:2}}>{el.name}</div>
                                <div style={{height:3,background:"#0a1525",borderRadius:2}}><div style={{width:`${elP}%`,height:"100%",background:elP===100?"#22c55e":el.color,borderRadius:2}}/></div>
                              </div>
                              <span style={{fontSize:9,color:elP===100?"#22c55e":"#1e3a5f",minWidth:55,textAlign:"right"}}>{elD}/{elT.length} · {elP}%</span>
                            </div>
                          );
                        })}
                      </div>
                    )}

                    {pending.length>0&&(
                      <div style={{borderTop:"1px solid #0a1525",paddingTop:12,marginTop:4}}>
                        <div style={{fontSize:8,color:"#1e3a5f",letterSpacing:2,marginBottom:8}}>IMMEDIATE ACTIONS OUTSTANDING</div>
                        {pending.map(t=><div key={t.id} style={{fontSize:10,color:"#f59e0b",marginBottom:4}}>▸ {t.text}</div>)}
                      </div>
                    )}
                  </div>

                  <div style={{...C.briefCard,borderColor:"#0e1e30",borderLeftColor:"#2563eb",borderLeftWidth:3,boxShadow:"none"}}>
                    <div style={C.lbl}>VERBAL RATIONALE</div>
                    <div style={{fontSize:11,color:"#c8dcea",lineHeight:2,fontStyle:"italic",marginTop:8}}>
                      "We opened {bc.name} on subject {bc.subject} based on {bc.source||"[source]"} predication indicating a potential violation of {bc.violation||"[statute]"}.{sol?` SOL expires in ${sol} days.`:""} Element completion stands at {bp}%{pending.length?`, with ${pending.length} immediate sub-steps outstanding`:""}.{bc.notes?` Predication: ${bc.notes}.`:""}"
                    </div>
                  </div>
                </>
              );
            })()}
            {!bc&&<div style={{fontSize:12,color:"#1e3a5f",textAlign:"center",padding:"50px 0",fontStyle:"italic"}}>No cases available.</div>}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
