<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CI Case Workflow</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#0b1220; color:#dbeafe; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 16px; }
    .card { background:#111a2b; border:1px solid #1e2a44; border-radius:8px; padding:12px; margin-bottom:12px; }
    input, select, textarea, button { width:100%; box-sizing:border-box; margin-top:6px; margin-bottom:10px; padding:8px; border-radius:6px; border:1px solid #2a3a5d; background:#0b1220; color:#dbeafe; }
    button { cursor:pointer; }
    .row { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    .tabs { display:flex; gap:8px; margin-bottom:12px; }
    .tab { width:auto; padding:8px 12px; }
    .active { border-color:#60a5fa; color:#60a5fa; }
    .task { display:flex; gap:8px; align-items:flex-start; padding:6px 0; border-bottom:1px solid #1b2740; }
    .muted { color:#93a4c2; font-size:12px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const STORAGE_KEY = "ci_workflow_stable_v1";

const STATUTES = {
  "18 U.S.C. § 794": [
    "Identify foreign contact chain",
    "Confirm NDI involved",
    "Document delivery/attempt evidence"
  ],
  "18 U.S.C. § 951": [
    "Establish foreign direction/control",
    "Document U.S.-based acts",
    "Verify no AG/FARA notification"
  ],
  "18 U.S.C. § 1030": [
    "Preserve forensic artifacts",
    "Confirm unauthorized access path",
    "Quantify loss/damage"
  ]
};

const seedCases = [
  { id: 1, name: "CI-2024-001", subject: "FALCON", violation: "18 U.S.C. § 794", source: "HUMINT", notes: "Initial foreign contact reporting", status: "ACTIVE" }
];

function buildTasks(violation) {
  const steps = STATUTES[violation] || ["Review predication", "Collect corroboration", "Prepare prosecutive memo"];
  return steps.map((text, i) => ({ id: i + 1, text, done: false }));
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (_) {
    return null;
  }
}

function save(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (_) {}
}

function App() {
  const [tab, setTab] = React.useState("intake");
  const [cases, setCases] = React.useState([]);
  const [tasks, setTasks] = React.useState({});
  const [selectedId, setSelectedId] = React.useState(null);
  const [form, setForm] = React.useState({ name:"", subject:"", violation:"18 U.S.C. § 794", source:"", notes:"", status:"ACTIVE" });

  React.useEffect(() => {
    const data = load();
    if (data && data.cases && data.tasks) {
      setCases(data.cases);
      setTasks(data.tasks);
      setSelectedId(data.cases[0] ? data.cases[0].id : null);
      return;
    }
    const initialTasks = { 1: buildTasks(seedCases[0].violation) };
    setCases(seedCases);
    setTasks(initialTasks);
    setSelectedId(1);
    save({ cases: seedCases, tasks: initialTasks });
  }, []);

  function persist(nextCases, nextTasks) {
    setCases(nextCases);
    setTasks(nextTasks);
    save({ cases: nextCases, tasks: nextTasks });
  }

  function addCase() {
    if (!form.name.trim()) return;
    const id = Date.now();
    const c = { ...form, id };
    const nextCases = [...cases, c];
    const nextTasks = { ...tasks, [id]: buildTasks(c.violation) };
    persist(nextCases, nextTasks);
    setSelectedId(id);
    setForm({ name:"", subject:"", violation:"18 U.S.C. § 794", source:"", notes:"", status:"ACTIVE" });
    setTab("tasks");
  }

  function toggleTask(caseId, taskId) {
    const caseTasks = tasks[caseId] || [];
    const nextTasks = {
      ...tasks,
      [caseId]: caseTasks.map(t => t.id === taskId ? { ...t, done: !t.done } : t)
    };
    persist(cases, nextTasks);
  }

  const selectedCase = cases.find(c => c.id === selectedId) || null;
  const selectedTasks = selectedCase ? (tasks[selectedCase.id] || []) : [];
  const completed = selectedTasks.filter(t => t.done).length;
  const pct = selectedTasks.length ? Math.round((completed / selectedTasks.length) * 100) : 0;

  return (
    <div className="wrap">
      <h2 style={{marginTop:0}}>CI Workflow (Stable Build)</h2>
      <div className="tabs">
        <button className={`tab ${tab==="intake"?"active":""}`} onClick={() => setTab("intake")}>Intake</button>
        <button className={`tab ${tab==="tasks"?"active":""}`} onClick={() => setTab("tasks")}>Tasks</button>
        <button className={`tab ${tab==="brief"?"active":""}`} onClick={() => setTab("brief")}>Briefing</button>
      </div>

      {tab === "intake" && (
        <div className="card">
          <h3>Open Case</h3>
          <div className="row">
            <div><label>Case Name</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} /></div>
            <div><label>Subject</label><input value={form.subject} onChange={e=>setForm({...form,subject:e.target.value})} /></div>
          </div>
          <label>Statute</label>
          <select value={form.violation} onChange={e=>setForm({...form,violation:e.target.value})}>
            {Object.keys(STATUTES).map(s => <option key={s} value={s}>{s}</option>)}
          </select>
          <label>Source</label>
          <input value={form.source} onChange={e=>setForm({...form,source:e.target.value})} />
          <label>Predication Summary</label>
          <textarea rows="3" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}></textarea>
          <button onClick={addCase}>Open Case & Generate Tasks</button>
        </div>
      )}

      {tab === "tasks" && (
        <div className="card">
          <label>Select Case</label>
          <select value={selectedId || ""} onChange={e=>setSelectedId(Number(e.target.value))}>
            {cases.map(c => <option key={c.id} value={c.id}>{c.name} — {c.subject || "N/A"}</option>)}
          </select>
          {selectedCase && <div className="muted">{selectedCase.violation} • {completed}/{selectedTasks.length} complete ({pct}%)</div>}
          <div style={{marginTop:10}}>
            {selectedTasks.map(t => (
              <div className="task" key={t.id}>
                <input style={{width:18,margin:0}} type="checkbox" checked={t.done} onChange={() => toggleTask(selectedCase.id, t.id)} />
                <div style={{textDecoration:t.done?"line-through":"none"}}>{t.text}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab === "brief" && (
        <div className="card">
          <label>Select Case</label>
          <select value={selectedId || ""} onChange={e=>setSelectedId(Number(e.target.value))}>
            {cases.map(c => <option key={c.id} value={c.id}>{c.name} — {c.subject || "N/A"}</option>)}
          </select>
          {selectedCase && (
            <>
              <p><b>Subject:</b> {selectedCase.subject || "N/A"}</p>
              <p><b>Statute:</b> {selectedCase.violation}</p>
              <p><b>Source:</b> {selectedCase.source || "N/A"}</p>
              <p><b>Status:</b> {selectedCase.status}</p>
              <p><b>Predication:</b> {selectedCase.notes || "N/A"}</p>
              <p><b>Progress:</b> {completed}/{selectedTasks.length} ({pct}%)</p>
            </>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
