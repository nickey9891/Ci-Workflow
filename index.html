// ── Storage ───────────────────────────────────────────────────────────────────
const STORAGE_KEY = "ci_workflow_v3";
const LEGACY_KEY  = "ci_workflow_v2";
const loadData = () => {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    if (d) return JSON.parse(d);
    // Migrate from v2 if present
    const legacy = localStorage.getItem(LEGACY_KEY);
    if (legacy) {
      const parsed = JSON.parse(legacy);
      const cases = (parsed.cases || []).map(c => ({
        ...c,
        violations: c.violations || (c.violation ? [c.violation] : []),
        tier: c.tier || "PRELIMINARY",
        aiAnalysis: c.aiAnalysis || null,
      }));
      return { cases, caseTasks: parsed.caseTasks || {} };
    }
    return null;
  } catch(_){ return null; }
};
const saveData = (cases, caseTasks) => {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ cases, caseTasks })); } catch(_){}
};

- ASSESSMENT: lowest tier, no specific factual predication required, limited methods
- PRELIMINARY INVESTIGATION: information/allegation indicating possible criminal or NS threat; most non-sensitive methods authorized; defined duration
- GUARDIAN: lead/threat assessment, narrow scope, short duration, limited methods
- FULL INVESTIGATION: articulable factual basis of criminal/NS threat; full methods including FISA, Title III, UCO, sensitive techniques (with approvals)

CRITICAL RULES:
1. Tailor authorized methods strictly to the tier the user provided. Do NOT recommend Full-tier methods (FISA, Title III, UCOs, undisclosed participation in religious/political org meetings, etc.) for Preliminary or Guardian tiers.
2. Always note that any sensitive investigative matter, sensitive technique, FISA, Title III, undercover operation, or undisclosed participation requires written approval per AGG-Dom/DIOG — do not imply field agent discretion.
3. Cross-reference multiple statutes when provided — surface the strongest charging theory and any synergies.
4. Be specific and operational. Cite typical coordination partners (USAO/NSD, CDC, SSA, FBI HQ, IC partners like NSA/CIA/NCSC, regulators like OFAC/BIS/DDTC, FinCEN, CISA, CBP/HSI) where relevant.
5. NEVER produce false statements about law or procedure. If a method's availability depends on facts you don't have, say so.

Return JSON with this exact shape:
{
  "tier_assessment": "string — 1-2 sentences confirming the tier is appropriate or recommending escalation/de-escalation given the predication",
  "next_steps": [{"priority":"HIGH|MEDIUM|LOW", "action":"string", "rationale":"string", "approval_required":"string or null"}],
  "authorized_methods": [{"method":"string", "tier_appropriate":true|false, "approval_required":"string or null", "notes":"string"}],
  "collection_gaps": [{"gap":"string", "why_it_matters":"string", "how_to_close":"string"}],
  "coordination": [{"partner":"string", "purpose":"string", "timing":"string"}],
  "escalation_triggers": ["string"],
  "elements_checklist": [{"statute":"string", "element":"string", "evidence_needed":"string", "status":"DEVELOPED|PARTIAL|GAP"}]
}`;

  const userPrompt = `INVESTIGATIVE TIER: ${tier}

STATUTE(S) UNDER INVESTIGATION:
${statuteList}

SUBJECT: ${subject || "(not provided)"}
SOURCE/PREDICATION CHANNEL: ${source || "(not provided)"}
PREDICATION NARRATIVE: ${notes || "(not provided)"}

EVIDENCE/STEPS COMPLETED TO DATE:
${completedSummary}

OUTSTANDING STEPS:
${openSummary}

Produce the JSON analysis now.`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 4000,
      system: systemPrompt,
      messages: [{ role: "user", content: userPrompt }],
    }),
  });

  if (!response.ok) {
    const errText = await response.text().catch(()=>"");
    throw new Error(`API ${response.status}: ${errText.slice(0,200)}`);
  }

  const data = await response.json();
  const text = (data.content || [])
    .filter(b => b.type === "text")
    .map(b => b.text)
    .join("\n")
    .trim();

  const cleaned = text.replace(/```json\s*/gi, "").replace(/```\s*/g, "").trim();
  // Find first { and last }
  const start = cleaned.indexOf("{");
  const end = cleaned.lastIndexOf("}");
  if (start === -1 || end === -1) throw new Error("No JSON object found in response");
  return JSON.parse(cleaned.slice(start, end + 1));
}

                                  <span style={{fontSize:9,color:"#1e3a5f",letterSpacing:1}}>{e.statute}</span>
                                </div>
                                <div style={{color:"#b8d0e8",fontWeight:"bold",marginBottom:4}}>{e.element}</div>
                                <div style={{fontSize:10,color:"#7090a8"}}><span style={{color:"#1e3a5f"}}>EVIDENCE NEEDED:</span> {e.evidence_needed}</div>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                })()}

                {!ac.aiAnalysis && !aiLoading && (
                  <div style={{fontSize:11,color:"#1e3a5f",textAlign:"center",padding:"40px 20px",fontStyle:"italic",border:"1px dashed #0a1525",background:"#070e1c"}}>
                    No analysis generated yet for this case. Click "GENERATE NEXT STEPS & GAP ANALYSIS" above.<br/><br/>
                    Analysis is tier-scoped: <span style={{color:TIER_COL[ac.tier||"PRELIMINARY"]}}>{ac.tier||"PRELIMINARY"}</span> tier methods only.
                  </div>
                )}
              </>
            )}
            {!ac && <div style={{fontSize:12,color:"#1e3a5f",textAlign:"center",padding:"50px 0",fontStyle:"italic"}}>No cases available.</div>}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
